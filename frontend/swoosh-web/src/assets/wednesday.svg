<svg width="100%" viewBox="0 0 680 680" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Soft star-field glow around planet region -->
    <radialGradient id="sceneGlow" cx="50%" cy="48%" r="42%">
      <stop offset="0%"   stop-color="#0a3848" stop-opacity="0.38"/>
      <stop offset="55%"  stop-color="#041828" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#000"    stop-opacity="0"/>
    </radialGradient>

    <!-- Planet day-side: lit from upper-right, vivid -->
    <radialGradient id="pDay" cx="72%" cy="24%" r="68%">
      <stop offset="0%"   stop-color="#ccfffe"/>
      <stop offset="12%"  stop-color="#44d4d0"/>
      <stop offset="34%"  stop-color="#0c7888"/>
      <stop offset="62%"  stop-color="#032434"/>
      <stop offset="100%" stop-color="#000a10"/>
    </radialGradient>

    <!-- Night shadow: strong, linear -->
    <linearGradient id="nightShadow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#000608" stop-opacity="0.98"/>
      <stop offset="15%"  stop-color="#000a10" stop-opacity="0.93"/>
      <stop offset="32%"  stop-color="#000c12" stop-opacity="0.78"/>
      <stop offset="50%"  stop-color="#010e14" stop-opacity="0.48"/>
      <stop offset="65%"  stop-color="#021018" stop-opacity="0.18"/>
      <stop offset="78%"  stop-color="#000"    stop-opacity="0.05"/>
      <stop offset="88%"  stop-color="#000"    stop-opacity="0"/>
      <stop offset="100%" stop-color="#000"    stop-opacity="0"/>
    </linearGradient>

    <!-- Specular highlight — brighter, tighter -->
    <radialGradient id="shine" cx="73%" cy="22%" r="38%">
      <stop offset="0%"   stop-color="#f0ffff" stop-opacity="0.72"/>
      <stop offset="30%"  stop-color="#60e8e8" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#000"    stop-opacity="0"/>
    </radialGradient>

    <!-- Ring shadow on planet — stronger -->
    <linearGradient id="ringShadow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#000" stop-opacity="0"/>
      <stop offset="22%"  stop-color="#000" stop-opacity="0"/>
      <stop offset="36%"  stop-color="#000810" stop-opacity="0.42"/>
      <stop offset="50%"  stop-color="#000810" stop-opacity="0.55"/>
      <stop offset="64%"  stop-color="#000810" stop-opacity="0.34"/>
      <stop offset="78%"  stop-color="#000" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </linearGradient>

    <clipPath id="pClip">
      <circle cx="340" cy="320" r="110"/>
    </clipPath>
  </defs>

  <!-- Nebula wisps — richer, more visible -->
  <ellipse cx="500" cy="130" rx="240" ry="60" fill="#001c30" opacity="0.32" transform="rotate(14,500,130)"/>
  <ellipse cx="180" cy="560" rx="200" ry="50" fill="#00101e" opacity="0.25" transform="rotate(-10,180,560)"/>
  <ellipse cx="580" cy="480" rx="160" ry="40" fill="#001428" opacity="0.20" transform="rotate(6,580,480)"/>

  <!-- Stars — generous scatter, denser on dark left -->
  <circle cx="20"  cy="42"  r="1.2" fill="#cceeff" opacity="0.88"/>
  <circle cx="68"  cy="14"  r="0.9" fill="#eef8ff" opacity="0.70"/>
  <circle cx="118" cy="62"  r="1.4" fill="#fff"     opacity="0.92"/>
  <circle cx="42"  cy="128" r="0.7" fill="#fff"     opacity="0.58"/>
  <circle cx="16"  cy="250" r="1.0" fill="#cceeff"  opacity="0.65"/>
  <circle cx="8"   cy="382" r="1.2" fill="#eef8ff"  opacity="0.75"/>
  <circle cx="22"  cy="470" r="0.7" fill="#fff"     opacity="0.58"/>
  <circle cx="12"  cy="578" r="1.3" fill="#fff"     opacity="0.85"/>
  <circle cx="48"  cy="648" r="0.8" fill="#cceeff"  opacity="0.65"/>
  <circle cx="155" cy="32"  r="1.0" fill="#fff"     opacity="0.75"/>
  <circle cx="84"  cy="620" r="1.1" fill="#fff"     opacity="0.78"/>
  <circle cx="620" cy="24"  r="1.1" fill="#fff"     opacity="0.72"/>
  <circle cx="660" cy="82"  r="0.8" fill="#eef8ff"  opacity="0.58"/>
  <circle cx="670" cy="170" r="0.9" fill="#fff"     opacity="0.62"/>
  <circle cx="668" cy="392" r="1.0" fill="#eef8ff"  opacity="0.68"/>
  <circle cx="642" cy="566" r="1.2" fill="#fff"     opacity="0.78"/>
  <circle cx="608" cy="640" r="0.9" fill="#cceeff"  opacity="0.65"/>
  <circle cx="344" cy="12"  r="1.0" fill="#fff"     opacity="0.75"/>
  <circle cx="480" cy="22"  r="1.2" fill="#fff"     opacity="0.68"/>
  <circle cx="225" cy="20"  r="0.9" fill="#fff"     opacity="0.62"/>
  <circle cx="38"  cy="320" r="0.8" fill="#cceeff"  opacity="0.55"/>
  <circle cx="658" cy="290" r="0.8" fill="#fff"     opacity="0.58"/>

  <!-- Scene ambient glow around planet -->
  <circle cx="340" cy="320" r="340" fill="url(#sceneGlow)"/>

  <!-- ══════════════════════════════
       ENTIRE PLANET + RING SYSTEM
       tilted ~22° clockwise around planet center
  ══════════════════════════════ -->
  <g transform="rotate(22, 340, 320)">

    <!-- ── RINGS BACK HALF ── -->
    <!-- Gossamer outermost -->
    <path d="M 14 320 A 326 85 0 0 1 666 320" fill="none" stroke="#38a8b4" stroke-width="2"   opacity="0.12"/>
    <!-- r9 -->
    <path d="M 32 320 A 308 80 0 0 1 648 320" fill="none" stroke="#50b8c2" stroke-width="3.5" opacity="0.16"/>
    <!-- r8 -->
    <path d="M 54 320 A 286 74 0 0 1 626 320" fill="none" stroke="#78ccd4" stroke-width="5"   opacity="0.18"/>
    <!-- r7 -->
    <path d="M 72 320 A 268 70 0 0 1 608 320" fill="none" stroke="#90dce0" stroke-width="8"   opacity="0.20"/>
    <!-- r6 -->
    <path d="M 90 320 A 250 65 0 0 1 590 320" fill="none" stroke="#60c8ce" stroke-width="5.5" opacity="0.19"/>
    <!-- r5 wide bright outer -->
    <path d="M 106 320 A 234 61 0 0 1 574 320" fill="none" stroke="#b8f0ee" stroke-width="16" opacity="0.26"/>
    <path d="M 110 320 A 230 60 0 0 1 570 320" fill="none" stroke="#e8ffff" stroke-width="3.5" opacity="0.20"/>
    <!-- Cassini gap (dark lane) -->
    <path d="M 136 320 A 204 53 0 0 1 544 320" fill="none" stroke="#010a10" stroke-width="8"   opacity="0.80"/>
    <!-- r4 -->
    <path d="M 150 320 A 190 49 0 0 1 530 320" fill="none" stroke="#88dada" stroke-width="7"   opacity="0.22"/>
    <!-- r3 main bright inner -->
    <path d="M 168 320 A 172 45 0 0 1 512 320" fill="none" stroke="#c8f4f2" stroke-width="13"  opacity="0.28"/>
    <path d="M 172 320 A 168 44 0 0 1 508 320" fill="none" stroke="#eeffff" stroke-width="3"   opacity="0.18"/>
    <!-- r2 -->
    <path d="M 188 320 A 152 40 0 0 1 492 320" fill="none" stroke="#60c8cc" stroke-width="5"   opacity="0.20"/>
    <!-- r1 innermost -->
    <path d="M 204 320 A 136 35 0 0 1 476 320" fill="none" stroke="#40b0b8" stroke-width="3"   opacity="0.17"/>
    <!-- Fine dust lanes back -->
    <path d="M 98"  cy="320" fill="none"/>
    <path d="M 98 320 A 242 63 0 0 1 582 320"  fill="none" stroke="#d0f8f8" stroke-width="1.5" opacity="0.14"/>
    <path d="M 120 320 A 220 57 0 0 1 560 320" fill="none" stroke="#d0f8f8" stroke-width="1.5" opacity="0.13"/>
    <path d="M 76 320 A 264 69 0 0 1 604 320"  fill="none" stroke="#a8e4e8" stroke-width="1.5" opacity="0.11"/>
    <path d="M 160 320 A 180 47 0 0 1 520 320" fill="none" stroke="#c0f0f0" stroke-width="1.5" opacity="0.13"/>

    <!-- ── PLANET ── -->
    <!-- Atmosphere halo — stronger -->
    <circle cx="340" cy="320" r="132" fill="none" stroke="#0a8898" stroke-width="18" opacity="0.10"/>
    <circle cx="340" cy="320" r="120" fill="none" stroke="#22c0c0" stroke-width="7"  opacity="0.13"/>

    <!-- Planet base -->
    <circle cx="340" cy="320" r="110" fill="url(#pDay)"/>

    <!-- Bands + clip -->
    <g clip-path="url(#pClip)" transform="rotate(-8, 340, 320)">
      <!-- Barely-there diffuse bands -->
      <rect x="230" y="218" width="220" height="26" fill="#063a4a" opacity="0.28"/>
      <rect x="230" y="258" width="220" height="34" fill="#1a8c92" opacity="0.11"/>
      <rect x="230" y="304" width="220" height="22" fill="#042830" opacity="0.24"/>
      <rect x="230" y="340" width="220" height="32" fill="#0e7080" opacity="0.12"/>
      <rect x="230" y="382" width="220" height="24" fill="#042830" opacity="0.24"/>

      <!-- Polar dimming -->
      <ellipse cx="340" cy="212" rx="110" ry="32" fill="#010c14" opacity="0.35"/>
      <ellipse cx="340" cy="428" rx="110" ry="32" fill="#010c14" opacity="0.40"/>

      <!-- Ring shadow band — wide, centered on equator -->
      <rect x="230" y="210" width="220" height="220" fill="url(#ringShadow)" opacity="0.80"/>

      <!-- Specular -->
      <circle cx="340" cy="320" r="110" fill="url(#shine)"/>

      <!-- Night shadow -->
      <rect x="230" y="210" width="220" height="220" fill="url(#nightShadow)"/>
    </g>

    <!-- ── RINGS FRONT HALF ── -->
    <path d="M 204 320 A 136 35 0 0 0 476 320" fill="none" stroke="#40b0b8" stroke-width="3"   opacity="0.22"/>
    <path d="M 188 320 A 152 40 0 0 0 492 320" fill="none" stroke="#60c8cc" stroke-width="5"   opacity="0.27"/>
    <path d="M 172 320 A 168 44 0 0 0 508 320" fill="none" stroke="#eeffff" stroke-width="3"   opacity="0.24"/>
    <path d="M 168 320 A 172 45 0 0 0 512 320" fill="none" stroke="#c8f4f2" stroke-width="13"  opacity="0.40"/>
    <path d="M 150 320 A 190 49 0 0 0 530 320" fill="none" stroke="#88dada" stroke-width="7"   opacity="0.30"/>
    <!-- Cassini gap front -->
    <path d="M 136 320 A 204 53 0 0 0 544 320" fill="none" stroke="#010a10" stroke-width="8"   opacity="0.88"/>
    <path d="M 110 320 A 230 60 0 0 0 570 320" fill="none" stroke="#e8ffff" stroke-width="3.5" opacity="0.28"/>
    <path d="M 106 320 A 234 61 0 0 0 574 320" fill="none" stroke="#c0f0ee" stroke-width="16"  opacity="0.40"/>
    <path d="M 90 320 A 250 65 0 0 0 590 320" fill="none" stroke="#60c8ce" stroke-width="5.5"  opacity="0.25"/>
    <path d="M 72 320 A 268 70 0 0 0 608 320" fill="none" stroke="#90dce0" stroke-width="8"    opacity="0.28"/>
    <path d="M 54 320 A 286 74 0 0 0 626 320" fill="none" stroke="#78ccd4" stroke-width="5"    opacity="0.24"/>
    <path d="M 32 320 A 308 80 0 0 0 648 320" fill="none" stroke="#50b8c2" stroke-width="3.5"  opacity="0.20"/>
    <path d="M 14 320 A 326 85 0 0 0 666 320" fill="none" stroke="#38a8b4" stroke-width="2"    opacity="0.14"/>
    <!-- Fine dust lanes front -->
    <path d="M 98 320 A 242 63 0 0 0 582 320"  fill="none" stroke="#d0f8f8" stroke-width="1.5" opacity="0.18"/>
    <path d="M 120 320 A 220 57 0 0 0 560 320" fill="none" stroke="#d0f8f8" stroke-width="1.5" opacity="0.17"/>
    <path d="M 76 320 A 264 69 0 0 0 604 320"  fill="none" stroke="#a8e4e8" stroke-width="1.5" opacity="0.15"/>
    <path d="M 160 320 A 180 47 0 0 0 520 320" fill="none" stroke="#c0f0f0" stroke-width="1.5" opacity="0.16"/>

  </g><!-- end rotate group -->

</svg>