<svg xmlns="http://www.w3.org/2000/svg" viewBox="-55 85 190 95">
  <defs>
    <radialGradient id="cometCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="1.0"/>
      <stop offset="35%"  stop-color="#e8f4ff" stop-opacity="0.85"/>
      <stop offset="70%"  stop-color="#a8d0ff" stop-opacity="0.40"/>
      <stop offset="100%" stop-color="#6090d0" stop-opacity="0"/>
    </radialGradient>
    <!-- Fade the tail ends: transparent on left, fully opaque by 35% -->
    <linearGradient id="tailFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="white" stop-opacity="0"/>
      <stop offset="35%" stop-color="white" stop-opacity="1"/>
      <stop offset="100%" stop-color="white" stop-opacity="1"/>
    </linearGradient>
    <mask id="cometMask">
      <rect x="-55" y="85" width="190" height="95" fill="url(#tailFade)"/>
    </mask>
  </defs>
  <g mask="url(#cometMask)">
    <!-- tail (warm tones) -->
    <path d="M112 148 Q60 165 -30 130" fill="none" stroke="#f0e8c0" stroke-width="18" stroke-linecap="round" opacity="0.22"/>
    <path d="M112 148 Q55 170 -40 145" fill="none" stroke="#e8dca8" stroke-width="11" stroke-linecap="round" opacity="0.16"/>
    <path d="M112 148 Q52 178 -45 165" fill="none" stroke="#d8cc90" stroke-width="6"  stroke-linecap="round" opacity="0.10"/>
    <!-- tail (cool tones) -->
    <path d="M112 146 Q70 130 -10 108" fill="none" stroke="#c8e0ff" stroke-width="5"   stroke-linecap="round" opacity="0.32"/>
    <path d="M112 146 Q68 128 -18 104" fill="none" stroke="#d8eaff" stroke-width="2.5" stroke-linecap="round" opacity="0.24"/>
    <path d="M112 146 Q66 126 -28 100" fill="none" stroke="#e8f4ff" stroke-width="1.2" stroke-linecap="round" opacity="0.16"/>
    <!-- coma / glow -->
    <circle cx="112" cy="148" r="10"  fill="#a8c8f0" opacity="0.14"/>
    <circle cx="112" cy="148" r="6"   fill="#c8dff8" opacity="0.22"/>
    <!-- nucleus -->
    <circle cx="112" cy="148" r="3.5" fill="url(#cometCore)" opacity="0.90"/>
    <circle cx="112" cy="148" r="2"   fill="#ffffff"          opacity="0.96"/>
  </g>
</svg>
