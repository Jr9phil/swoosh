<svg width="100%" viewBox="0 0 680 680" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="sceneGlow" cx="50%" cy="48%" r="42%">
      <stop offset="0%"   stop-color="#3a0808" stop-opacity="0.40"/>
      <stop offset="55%"  stop-color="#180204" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#000"    stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="pDay" cx="72%" cy="24%" r="70%">
      <stop offset="0%"   stop-color="#ff9050"/>
      <stop offset="14%"  stop-color="#f04010"/>
      <stop offset="36%"  stop-color="#b01600"/>
      <stop offset="62%"  stop-color="#600800"/>
      <stop offset="100%" stop-color="#1c0100"/>
    </radialGradient>

    <linearGradient id="nightShadow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#060000" stop-opacity="0.98"/>
      <stop offset="15%"  stop-color="#080000" stop-opacity="0.93"/>
      <stop offset="32%"  stop-color="#0d0100" stop-opacity="0.78"/>
      <stop offset="50%"  stop-color="#150100" stop-opacity="0.48"/>
      <stop offset="65%"  stop-color="#200200" stop-opacity="0.18"/>
      <stop offset="78%"  stop-color="#000"    stop-opacity="0.05"/>
      <stop offset="88%"  stop-color="#000"    stop-opacity="0"/>
      <stop offset="100%" stop-color="#000"    stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="shine" cx="73%" cy="22%" r="38%">
      <stop offset="0%"   stop-color="#ffddaa" stop-opacity="0.72"/>
      <stop offset="30%"  stop-color="#ff6020" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#000"    stop-opacity="0"/>
    </radialGradient>

    <!-- Large moon gradient — lit from upper-right -->
    <radialGradient id="mGrad" cx="68%" cy="28%" r="65%">
      <stop offset="0%"   stop-color="#d4aa70"/>
      <stop offset="50%"  stop-color="#7a4a28"/>
      <stop offset="100%" stop-color="#220800"/>
    </radialGradient>

    <!-- Small moon gradient -->
    <radialGradient id="m2Grad" cx="70%" cy="32%" r="60%">
      <stop offset="0%"   stop-color="#c09060"/>
      <stop offset="55%"  stop-color="#603820"/>
      <stop offset="100%" stop-color="#180500"/>
    </radialGradient>

    <clipPath id="pClip">
      <circle cx="340" cy="320" r="110"/>
    </clipPath>
  </defs>

  <!-- Nebula wisps -->
  <ellipse cx="180" cy="558" rx="200" ry="48" fill="#100004" opacity="0.22" transform="rotate(-10,180,558)"/>

  <!-- Scene ambient glow -->
  <circle cx="340" cy="320" r="340" fill="url(#sceneGlow)"/>

  <!-- ══════════════════════════════════════
       PLANET — tilted 22° clockwise
  ══════════════════════════════════════ -->
  <g transform="rotate(22, 340, 320)">

    <!-- Atmosphere halo -->
    <circle cx="340" cy="320" r="134" fill="none" stroke="#c03000" stroke-width="20" opacity="0.09"/>
    <circle cx="340" cy="320" r="122" fill="none" stroke="#ff5020" stroke-width="8"  opacity="0.12"/>

    <!-- Planet base -->
    <circle cx="340" cy="320" r="110" fill="url(#pDay)"/>

    <!-- Bands and storms clipped -->
    <g clip-path="url(#pClip)">
      <g transform="rotate(-14, 340, 320)">
        <rect x="230" y="198" width="220" height="14" fill="#5a0800" opacity="0.82"/>
        <rect x="230" y="214" width="220" height="8"  fill="#b01800" opacity="0.40"/>
        <rect x="230" y="228" width="220" height="16" fill="#660a00" opacity="0.76"/>
        <rect x="230" y="242" width="220" height="8"  fill="#e02800" opacity="0.32"/>
        <rect x="230" y="256" width="220" height="20" fill="#ff4a18" opacity="0.54"/>
        <rect x="230" y="264" width="220" height="9"  fill="#ff8040" opacity="0.40"/>
        <rect x="230" y="278" width="220" height="12" fill="#380500" opacity="0.92"/>
        <rect x="230" y="292" width="220" height="30" fill="#cc2000" opacity="0.64"/>
        <rect x="230" y="300" width="220" height="16" fill="#ff5a20" opacity="0.36"/>
        <rect x="230" y="326" width="220" height="10" fill="#420600" opacity="0.90"/>
        <rect x="230" y="338" width="220" height="22" fill="#be1c00" opacity="0.60"/>
        <rect x="230" y="346" width="220" height="10" fill="#ff4020" opacity="0.28"/>
        <rect x="230" y="364" width="220" height="16" fill="#600900" opacity="0.80"/>
        <rect x="230" y="382" width="220" height="20" fill="#e02400" opacity="0.56"/>
        <rect x="230" y="390" width="220" height="8"  fill="#ff6020" opacity="0.30"/>
        <rect x="230" y="406" width="220" height="12" fill="#480700" opacity="0.84"/>

        <path d="M230 268 Q268 260 306 270 Q340 278 374 264 Q402 252 450 268 L450 278 Q400 270 366 282 Q332 292 298 278 Q262 264 230 278Z" fill="#ff7848" opacity="0.26"/>
        <path d="M230 304 Q266 294 304 306 Q342 318 378 300 Q410 284 450 304 L450 316 Q408 320 372 314 Q338 308 302 322 Q266 336 230 318Z" fill="#ff5828" opacity="0.30"/>
        <path d="M230 348 Q266 338 305 352 Q342 364 378 346 Q410 330 450 348 L450 360 Q408 366 370 356 Q334 346 298 362 Q264 376 230 360Z" fill="#be2200" opacity="0.26"/>

        <!-- Storm eye -->
        <ellipse cx="302" cy="308" rx="34" ry="15" fill="#ff2800" opacity="0.52"/>
        <ellipse cx="302" cy="308" rx="24" ry="10" fill="#ff5020" opacity="0.58"/>
        <ellipse cx="302" cy="308" rx="14" ry="6"  fill="#ff8040" opacity="0.62"/>
        <ellipse cx="302" cy="308" rx="7"  ry="3"  fill="#ffb860" opacity="0.68"/>
        <ellipse cx="302" cy="308" rx="3"  ry="1.5" fill="#fff"   opacity="0.50"/>
        <path d="M272 308 Q284 298 296 296 Q312 292 322 300" fill="none" stroke="#ff5828" stroke-width="1.8" opacity="0.44"/>
        <path d="M272 308 Q284 318 296 320 Q312 324 322 316" fill="none" stroke="#e02808" stroke-width="1.5" opacity="0.38"/>

        <!-- Secondary cyclone -->
        <ellipse cx="404" cy="262" rx="16" ry="7"  fill="#e82800" opacity="0.44"/>
        <ellipse cx="404" cy="262" rx="9"  ry="4"  fill="#ff6830" opacity="0.50"/>
        <ellipse cx="404" cy="262" rx="4"  ry="2"  fill="#ffcc70" opacity="0.50"/>
        <ellipse cx="404" cy="262" rx="2"  ry="1"  fill="#fff"    opacity="0.38"/>

        <line x1="230" y1="252" x2="450" y2="248" stroke="#ff7838" stroke-width="0.8" opacity="0.16"/>
        <line x1="230" y1="286" x2="450" y2="282" stroke="#ff2808" stroke-width="0.8" opacity="0.15"/>
        <line x1="230" y1="336" x2="450" y2="332" stroke="#ff3818" stroke-width="0.8" opacity="0.16"/>
        <line x1="230" y1="398" x2="450" y2="394" stroke="#780a00" stroke-width="1.0" opacity="0.18"/>

        <ellipse cx="340" cy="210" rx="110" ry="32" fill="#0e0000" opacity="0.62"/>
        <ellipse cx="340" cy="430" rx="110" ry="32" fill="#0e0000" opacity="0.68"/>
      </g>

      <circle cx="340" cy="320" r="110" fill="url(#shine)"/>
      <rect x="230" y="210" width="220" height="220" fill="url(#nightShadow)"/>
    </g>

  </g>

  <!-- ══════════════════════════════════════
       MOONS — outside the planet rotate group
       so they sit in normal screen space
  ══════════════════════════════════════ -->

  <!-- Large foreground moon — lower-right, lit from upper-right -->
  <g transform="translate(41, -102)">
    <ellipse cx="528" cy="552" rx="22" ry="7" fill="#0a0000" opacity="0.38"/>
    <circle  cx="528" cy="526" r="32" fill="url(#mGrad)"/>
    <!-- Craters -->
    <circle cx="516" cy="516" r="6"   fill="none" stroke="#4a2810" stroke-width="1.4" opacity="0.62"/>
    <circle cx="516" cy="516" r="3"   fill="#3a1e08" opacity="0.42"/>
    <circle cx="540" cy="530" r="4"   fill="none" stroke="#4a2810" stroke-width="1.2" opacity="0.52"/>
    <circle cx="540" cy="530" r="2"   fill="#3a1e08" opacity="0.32"/>
    <circle cx="524" cy="538" r="5"   fill="none" stroke="#4a2810" stroke-width="1.2" opacity="0.46"/>
    <circle cx="524" cy="538" r="2.5" fill="#3a1e08" opacity="0.28"/>
    <circle cx="545" cy="516" r="2.8" fill="none" stroke="#4a2810" stroke-width="1"   opacity="0.44"/>
    <!-- Lit highlight -->
    <ellipse cx="538" cy="516" rx="12" ry="9" fill="#e8c088" opacity="0.24"/>
    <!-- Night side shadow -->
    <rect x="496" y="494" width="64" height="64" fill="url(#nightShadow)" opacity="0.88" style="clip-path: circle(32px at 32px 32px)"/>
    <!-- Planet glow rim -->
    <circle cx="528" cy="526" r="32" fill="none" stroke="#ff4400" stroke-width="4" opacity="0.16"/>
  </g>

  <!-- Small distant moon — upper-left, mostly in shadow -->
  <g transform="translate(-52, 85)">
    <circle cx="112" cy="122" r="14" fill="url(#m2Grad)"/>
    <!-- Night shadow covers most of it — sun is on the right so left moon is dark -->
    <rect x="98" y="108" width="28" height="28" fill="url(#nightShadow)" opacity="0.92" style="clip-path: circle(14px at 14px 14px)"/>
    <!-- Craters just barely visible on lit sliver -->
    <circle cx="120" cy="116" r="2.8" fill="none" stroke="#5a3018" stroke-width="0.9" opacity="0.50"/>
    <circle cx="113" cy="126" r="1.8" fill="none" stroke="#5a3018" stroke-width="0.9" opacity="0.40"/>
    <!-- Faint rim glow -->
    <circle cx="112" cy="122" r="14" fill="none" stroke="#ff4400" stroke-width="3" opacity="0.10"/>
  </g>

</svg>