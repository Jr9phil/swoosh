<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/swoosh.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@400;500&display=swap" rel="stylesheet">
    <title>Swoosh</title>
    <script>
      (function () {
        var faviconLink = document.querySelector('link[rel="icon"]');
        var originalHref = faviconLink.href;
        var darkHref = null;

        function buildInvertedFavicon(callback) {
          if (darkHref) { callback(darkHref); return; }
          var img = new Image();
          img.crossOrigin = 'anonymous';
          img.onload = function () {
            var canvas = document.createElement('canvas');
            canvas.width = img.width;
            canvas.height = img.height;
            var ctx = canvas.getContext('2d');
            ctx.filter = 'invert(1)';
            ctx.drawImage(img, 0, 0);
            darkHref = canvas.toDataURL('image/png');
            callback(darkHref);
          };
          img.src = originalHref;
        }

        function applyFavicon(dark) {
          if (dark) {
            buildInvertedFavicon(function (href) { faviconLink.href = href; });
          } else {
            faviconLink.href = originalHref;
          }
        }

        var mq = window.matchMedia('(prefers-color-scheme: dark)');
        applyFavicon(mq.matches);
        mq.addEventListener('change', function (e) { applyFavicon(e.matches); });
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
